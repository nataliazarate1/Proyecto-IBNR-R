<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1700" viewBox="0 0 1800 1700">
  <defs>
    <style>
      .title { font: 700 38px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #000000; }
      .section-title { font: 700 25px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .body { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #000000; }
      .body-bold { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #000000; }
      .small { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #000000; }
      .lane { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #000000; letter-spacing: 0.6px; }
      .badge { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .box-main { fill: #f3f6f9; stroke: #17324d; stroke-width: 2.8; rx: 22; ry: 22; }
      .box-accent { fill: #fafbfd; stroke: #6c8093; stroke-width: 2.2; rx: 22; ry: 22; }
      .box-valid { fill: #f2f7f4; stroke: #50765f; stroke-width: 2.5; rx: 22; ry: 22; }
      .box-study { fill: #fbf7f2; stroke: #8a6848; stroke-width: 2.5; rx: 22; ry: 22; }
      .box-final { fill: #f5f3f8; stroke: #5f5482; stroke-width: 2.5; rx: 22; ry: 22; }
      .num-main { fill: #17324d; }
      .num-valid { fill: #50765f; }
      .num-study { fill: #8a6848; }
      .num-final { fill: #5f5482; }
      .line-main { stroke: #17324d; stroke-width: 2.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-soft { stroke: #70869a; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .divider { stroke: #d3dbe3; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow-main" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#17324d"/>
    </marker>
    <marker id="arrow-soft" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M 0 0 L 9 4.5 L 0 9 z" fill="#70869a"/>
    </marker>
    <marker id="arrow-soft-large" markerWidth="11" markerHeight="11" refX="9" refY="5.5" orient="auto">
      <path d="M 0 0 L 11 5.5 L 0 11 z" fill="#70869a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1700" fill="#ffffff"/>

  <text x="900" y="62" text-anchor="middle" class="title">Esquema metodológico del estudio</text>
  <text x="900" y="95" text-anchor="middle" class="subtitle">
    Validación del simulador y experimento comparativo para la estimación robusta del IBNR
  </text>

  <circle cx="165" cy="209" r="34" class="num-main"/>
  <text x="165" y="209" text-anchor="middle" dominant-baseline="middle" class="badge">1</text>
  <rect x="230" y="125" width="1360" height="176" class="box-main"/>
  <text x="910" y="160" text-anchor="middle" class="section-title">Planteamiento del estudio</text>
  <text x="290" y="190" class="body">
    <tspan x="290" dy="0" class="body-bold">Pregunta de investigación:</tspan>
    <tspan dy="0"> determinar si las versiones robustas del método Chain-Ladder estiman el IBNR con mayor precisión</tspan>
    <tspan x="290" dy="27">y estabilidad que el método clásico cuando la información observada contiene outliers.</tspan>
  </text>
  <text x="290" y="240" class="body">
    <tspan x="290" dy="0" class="body-bold">Objetivo general:</tspan>
    <tspan dy="0"> evaluar comparativamente el método clásico y tres variantes robustas bajo escenarios controlados de</tspan>
    <tspan x="290" dy="27">contaminación para identificar en qué condiciones los métodos robustos superan al enfoque clásico.</tspan>
  </text>

  <path d="M 910 301 L 910 330" class="line-main" marker-end="url(#arrow-main)"/>

  <circle cx="165" cy="443" r="34" class="num-main"/>
  <text x="165" y="443" text-anchor="middle" dominant-baseline="middle" class="badge">2</text>
  <rect x="230" y="330" width="1360" height="192" class="box-accent"/>
  <text x="910" y="364" text-anchor="middle" class="section-title">Objetivos específicos</text>
  <text x="290" y="395" class="body">
    <tspan x="290" dy="0">1. Diseñar un proceso generador de triángulos incrementales y acumulados coherente con la lógica actuarial del IBNR.</tspan>
    <tspan x="290" dy="31">2. Implementar el método Chain-Ladder clásico y tres variantes robustas sobre la misma información observada.</tspan>
    <tspan x="290" dy="31">3. Evaluar precisión y estabilidad mediante sesgo, RMSE, MAPE, MAE y desviación estándar entre réplicas.</tspan>
    <tspan x="290" dy="31">4. Identificar en qué escenarios de contaminación los métodos robustos mejoran realmente frente al método clásico.</tspan>
  </text>

  <path d="M 910 522 L 910 560" class="line-main" marker-end="url(#arrow-main)"/>

  <circle cx="165" cy="680" r="34" class="num-main"/>
  <text x="165" y="680" text-anchor="middle" dominant-baseline="middle" class="badge">3</text>
  <rect x="230" y="560" width="1360" height="196" class="box-accent"/>
  <text x="910" y="594" text-anchor="middle" class="section-title">Configuración experimental</text>
  <text x="290" y="628" class="body">
    <tspan x="290" dy="0">Triángulos de dimensión 10 × 10, patrón de desarrollo acumulado, heterogeneidad entre años de ocurrencia y distribución Gamma como caso base.</tspan>
    <tspan x="290" dy="27">Se incluye una sensibilidad Lognormal para evaluar el efecto de colas más pesadas.</tspan>
  </text>
  <text x="290" y="694" class="body">
    <tspan x="290" dy="0">Escenarios de contaminación: proporción 0 %, 5 %, 10 % y 20 %, magnitud ×1, ×2, ×5 y ×10, y ubicación none, random, early y late.</tspan>
    <tspan x="290" dy="27">Las definiciones early y late se construyen sobre la región observada de cada fila, no sobre columnas globales.</tspan>
  </text>

  <path d="M 910 756 L 910 812" class="line-main" marker-end="url(#arrow-main)"/>

  <text x="540" y="854" text-anchor="middle" class="lane">CUADERNO DE APOYO TÉCNICO</text>
  <text x="1280" y="854" text-anchor="middle" class="lane">CUADERNO PRINCIPAL DEL PROYECTO DE GRADO</text>

  <path d="M 910 812 C 910 868, 540 872, 540 940" class="line-soft" marker-end="url(#arrow-soft)"/>
  <path d="M 910 812 C 910 868, 1280 872, 1280 940" class="line-soft" marker-end="url(#arrow-soft)"/>

  <circle cx="165" cy="1096" r="34" class="num-valid"/>
  <text x="165" y="1096" text-anchor="middle" dominant-baseline="middle" class="badge">3A</text>
  <rect x="290" y="940" width="500" height="312" class="box-valid"/>
  <text x="540" y="978" text-anchor="middle" class="section-title">Validación del simulador</text>
  <text x="540" y="1000" text-anchor="middle" class="small">validacion_simulador_ibnr.ipynb</text>
  <line x1="345" y1="1016" x2="735" y2="1016" class="divider"/>
  <text x="355" y="1048" class="small">
    <tspan x="355" dy="0">1. Verificar medias empíricas frente a medias teóricas.</tspan>
    <tspan x="355" dy="25">2. Comprobar coherencia entre incremental y acumulado.</tspan>
    <tspan x="355" dy="25">3. Confirmar la máscara observada y la definición</tspan>
    <tspan x="355" dy="22">   del IBNR verdadero.</tspan>
    <tspan x="355" dy="25">4. Revisar que la contaminación afecte solo</tspan>
    <tspan x="355" dy="22">   la región observable.</tspan>
    <tspan x="355" dy="25">5. Comprobar que, sin ruido, los métodos</tspan>
    <tspan x="355" dy="22">   recuperan el valor correcto.</tspan>
  </text>

  <circle cx="910" cy="1096" r="34" class="num-study"/>
  <text x="910" y="1096" text-anchor="middle" dominant-baseline="middle" class="badge">3B</text>
  <rect x="1030" y="940" width="500" height="320" class="box-study"/>
  <text x="1280" y="978" text-anchor="middle" class="section-title">Experimento principal</text>
  <text x="1280" y="1000" text-anchor="middle" class="small">ibnr_chain_ladder_robusto.ipynb</text>
  <line x1="1085" y1="1016" x2="1475" y2="1016" class="divider"/>
  <text x="1095" y="1048" class="small">
    <tspan x="1095" dy="0">1. Generar el triángulo incremental completo.</tspan>
    <tspan x="1095" dy="25">2. Construir el acumulado y definir la región observada.</tspan>
    <tspan x="1095" dy="25">3. Calcular el IBNR verdadero en la zona futura.</tspan>
    <tspan x="1095" dy="25">4. Introducir contaminación solo en la parte observada.</tspan>
    <tspan x="1095" dy="25">5. Estimar con cuatro métodos comparables.</tspan>
    <tspan x="1095" dy="25">6. Repetir el proceso en 1000 réplicas por escenario.</tspan>
    <tspan x="1095" dy="25">7. Calcular métricas, rankings y comparaciones pareadas.</tspan>
    <tspan x="1095" dy="25">8. Evaluar hipótesis y formular conclusiones.</tspan>
  </text>

  <path d="M 540 1252 C 540 1334, 910 1334, 910 1390" class="line-soft" marker-end="url(#arrow-soft-large)"/>
  <path d="M 1280 1260 C 1280 1338, 910 1338, 910 1390" class="line-soft" marker-end="url(#arrow-soft-large)"/>

  <circle cx="165" cy="1460" r="34" class="num-final"/>
  <text x="165" y="1460" text-anchor="middle" dominant-baseline="middle" class="badge">4</text>
  <rect x="230" y="1390" width="1360" height="158" class="box-final"/>
  <text x="910" y="1426" text-anchor="middle" class="section-title">Resultados, evaluación y conclusiones</text>
  <text x="290" y="1458" class="body">
    <tspan x="290" dy="0">Tablas resumen por escenario y por método, evaluación de hipótesis, sensibilidad Lognormal y conclusiones comparativas.</tspan>
    <tspan x="290" dy="27">Mensaje central: en escenarios limpios el método clásico conserva eficiencia. Cuando la contaminación aumenta, la</tspan>
    <tspan x="290" dy="27">mediana supera al método clásico con mayor consistencia en precisión y estabilidad.</tspan>
  </text>
</svg>
